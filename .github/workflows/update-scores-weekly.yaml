name: Update scores and coverage weekly

on:
  schedule:
    # Every Thursday at 12pm Eastern Time
    # GitHub Actions doesn't support time zones, so we use two cron schedules:
    - cron: "0 17 * 11-12,1-3 4" # 5pm UTC on Thurs (Nov-Dec, Jan-Mar) = 12pm EST
    - cron: "0 16 * 4-10 4" # 4pm UTC on Thurs (Apr-Oct) = 12pm EDT
  workflow_dispatch:
    inputs:
      lookback_days:
        description: "Number of days to look back for scoreable nowcasts (default: 7)"
        required: false
        default: "7"
      min_age_days:
        description: "Minimum age in days for scoring (default: 90)"
        required: false
        default: "90"

permissions:
  contents: write
  pull-requests: write

jobs:
  update-scores-and-coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v5
        with:
          # Check out necessary directories
          sparse-checkout: |
            .github/
            auxiliary-data/
            hub-config/
            model-output/
            target-data/
            src/

      - name: Set up R 📊
        uses: r-lib/actions/setup-r@bd49c52ffe281809afa6f0fecbf37483c5dd0b93  #v2.11.3
        with:
          r-version: 4.4.1
          install-r: true
          use-public-rspm: true
          extra-repositories: 'https://hubverse-org.r-universe.dev'

      - name: Set up renv 📦
        env:
          GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
        uses: r-lib/actions/setup-renv@bd49c52ffe281809afa6f0fecbf37483c5dd0b93  #v2.11.3
        with:
          working-directory: src

      - name: Update weekly scores 📊
        run: |
          Rscript update_scores_weekly.R
        working-directory: src

      - name: Update weekly coverage 📈
        run: |
          Rscript update_coverage_weekly.R
        working-directory: src

      - name: Check for changes 🔍
        id: check-changes
        run: |
          SCORES_CHANGED=false
          COVERAGE_CHANGED=false

          if ! git diff --quiet auxiliary-data/scores/scores.tsv; then
            SCORES_CHANGED=true
            echo "Changes detected in scores.tsv"
          fi

          if ! git diff --quiet auxiliary-data/scores/coverage.parquet; then
            COVERAGE_CHANGED=true
            echo "Changes detected in coverage.parquet"
          fi

          if [ "$SCORES_CHANGED" = true ] || [ "$COVERAGE_CHANGED" = true ]; then
            echo "changes=true" >> $GITHUB_OUTPUT
            echo "scores_changed=$SCORES_CHANGED" >> $GITHUB_OUTPUT
            echo "coverage_changed=$COVERAGE_CHANGED" >> $GITHUB_OUTPUT
          else
            echo "changes=false" >> $GITHUB_OUTPUT
            echo "No changes detected in scores.tsv or coverage.parquet"
          fi

      - name: Get current date and time 🕰️
        if: steps.check-changes.outputs.changes == 'true'
        run: |
          PR_DATETIME=$(date +'%Y-%m-%d_%H-%M-%S')
          echo "PR_DATETIME=$PR_DATETIME" >> $GITHUB_ENV

      - name: Create PR for updated scores and coverage 🚀
        if: steps.check-changes.outputs.changes == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b update-scores-coverage_"$PR_DATETIME"

          # Add changed files
          if [ "${{ steps.check-changes.outputs.scores_changed }}" = "true" ]; then
            git add auxiliary-data/scores/scores.tsv
          fi
          if [ "${{ steps.check-changes.outputs.coverage_changed }}" = "true" ]; then
            git add auxiliary-data/scores/coverage.parquet
          fi

          # Build commit message
          COMMIT_MSG="Update weekly scores and coverage ($PR_DATETIME)"
          git commit -m "$COMMIT_MSG"
          git push -u origin update-scores-coverage_"$PR_DATETIME"

          # Build PR body with details
          UPDATES=""
          if [ "${{ steps.check-changes.outputs.scores_changed }}" = "true" ]; then
            UPDATES="${UPDATES}- ✅ **scores.tsv**: Updated with newly scored nowcasts (90+ days old)"$'\n'
          fi
          if [ "${{ steps.check-changes.outputs.coverage_changed }}" = "true" ]; then
            UPDATES="${UPDATES}- ✅ **coverage.parquet**: Updated with coverage metrics for newly scored nowcasts"$'\n'
          fi

          gh pr create \
            --base main \
            --title "Update weekly scores and coverage $PR_DATETIME" \
            --body "## Weekly Scores and Coverage Update

          This PR was automatically generated by the update-scores-weekly.yaml workflow.

          ### What's Updated:
          ${UPDATES}

          ### Scoring Criteria:
          - Nowcasts must be at least 90 days old (ensures sufficient sequence data)
          - Oracle data and unscored location files must exist
          - Previously scored nowcasts are skipped

          ### Coverage Calculation:
          - Coverage is calculated for all nowcast dates present in scores.tsv
          - Coverage metrics include interval coverage, quantile coverage, and deviations
          - Only applies to sample-based model submissions

          ---
          *Created: $PR_DATETIME*"

      - name: No changes to commit ℹ️
        if: steps.check-changes.outputs.changes == 'false'
        run: |
          echo "No scores or coverage needed updating this week."
          echo "This is expected if:"
          echo "  - No nowcasts reached 90 days of age (for scores)"
          echo "  - All scored nowcasts already have coverage calculated"
